{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="row between">
    <h1>Venta</h1>
    <div class="caja">Caja: RD${{ '%.2f'|format(balance) }}</div>
  </div>
  <form method="post" class="venta-form" id="ventaForm">
    <label>Sorteo</label>
    <select name="sorteo_code" required>
      {% for s in sorteos %}
      <option value="{{ s.code }}" {% if not s.abierto %}disabled{% endif %}>
        {{ s.nombre }} {% if not s.abierto %}(CERRADO){% endif %}
        {% if s.estado_fuente == 'FUENTE_NO_DISPONIBLE' %} — fuente manual{% endif %}
      </option>
      {% endfor %}
    </select>

    <h2>Quiniela</h2>
    <div id="quinielaRows">
      <div class="play-grid">
        <input name="q_number" placeholder="00-99" maxlength="2"/>
        <input name="q_amount" placeholder="RD$" inputmode="decimal"/>
      </div>
    </div>
    <button type="button" class="ghost" onclick="addQ()">+ Quiniela</button>

    <h2>Palé</h2>
    <div id="paleRows">
      <div class="play-grid pale">
        <input name="p_a" placeholder="00" maxlength="2"/>
        <input name="p_b" placeholder="00" maxlength="2"/>
        <input name="p_amount" placeholder="RD$" inputmode="decimal"/>
      </div>
    </div>
    <button type="button" class="ghost" onclick="addP()">+ Palé</button>

    <p class="hint">Pagos: 1ª ×{{ snap.quiniela_primera }} · 2ª ×{{ snap.quiniela_segunda }} · 3ª ×{{ snap.quiniela_tercera }} · Palé ×{{ snap.pale }}</p>
    <button type="submit" class="primary">Vender e imprimir</button>
  </form>
</section>
<script>
function addQ(){
  var box=document.getElementById('quinielaRows');
  var d=document.createElement('div'); d.className='play-grid';
  d.innerHTML='<input name="q_number" placeholder="00-99" maxlength="2"/><input name="q_amount" placeholder="RD$" inputmode="decimal"/>';
  box.appendChild(d);
}
function addP(){
  var box=document.getElementById('paleRows');
  var d=document.createElement('div'); d.className='play-grid pale';
  d.innerHTML='<input name="p_a" placeholder="00" maxlength="2"/><input name="p_b" placeholder="00" maxlength="2"/><input name="p_amount" placeholder="RD$" inputmode="decimal"/>';
  box.appendChild(d);
}
</script>
{% endblock %}
