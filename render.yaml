services:
  - type: web
    name: jdm-anguila
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --worker-class gthread --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: BANK_NAME
        value: JDM ANGUILA
      - key: CLOSE_BEFORE_DRAW_MINUTES
        value: "5"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CAJERO_USER
        value: jose
      - key: CAJERO_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jdm-anguila-db
          property: connectionString

databases:
  - name: jdm-anguila-db
    plan: free
